<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Endee AI Search</title>
    <style>
        :root {
            --primary: #2563eb;
            --background: #f8fafc;
            --surface: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--background);
            color: var(--text-main);
            margin: 0;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            color: var(--text-main);
        }

        .search-box {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        input[type="text"] {
            flex: 1;
            padding: 1rem 1.5rem;
            font-size: 1.1rem;
            border: 2px solid #e2e8f0;
            border-radius: 0.75rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: var(--primary);
        }

        button {
            padding: 1rem 2rem;
            font-size: 1.1rem;
            font-weight: 600;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 0.75rem;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #1d4ed8;
        }

        .results {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .result-card {
            background: var(--surface);
            padding: 1.5rem;
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            transition: transform 0.2s;
        }

        .result-card:hover {
            transform: translateY(-2px);
        }

        .score {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            background: #e0e7ff;
            color: #4338ca;
            border-radius: 1rem;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }

        .category {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            background: #f1f5f9;
            color: var(--text-muted);
            border-radius: 1rem;
            font-size: 0.875rem;
            margin-bottom: 1rem;
            margin-left: 0.5rem;
        }

        .text {
            font-size: 1.1rem;
            line-height: 1.6;
        }

        .loading {
            text-align: center;
            color: var(--text-muted);
            font-size: 1.2rem;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Endee Vector Search</h1>
            <p style="color: var(--text-muted)">Semantic search powered by Endee and Sentence Transformers</p>
        </header>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Ask a question or search for concepts..." onkeypress="handleKeyPress(event)">
            <button onclick="performSearch()">Search</button>
        </div>

        <div id="loading" class="loading">Searching...</div>
        <div id="results" class="results"></div>
    </div>

    <script>
        function handleKeyPress(e) {
            if (e.key === 'Enter') {
                performSearch();
            }
        }

        async function performSearch() {
            const query = document.getElementById('searchInput').value;
            if (!query.trim()) return;

            const resultsDiv = document.getElementById('results');
            const loadingDiv = document.getElementById('loading');
            
            resultsDiv.innerHTML = '';
            loadingDiv.style.display = 'block';

            try {
                const response = await fetch('/search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: query, top_k: 5 })
                });

                const data = await response.json();
                
                if (data.error) {
                    throw new Error(data.error);
                }

                if (data.results && data.results.length > 0) {
                    data.results.forEach(result => {
                        const card = document.createElement('div');
                        card.className = 'result-card';
                        
                        const score = (result.score).toFixed(4);
                        const category = result.meta.category || 'unknown';
                        const text = result.meta.text || '';
                        
                        card.innerHTML = `
                            <span class="score">Score: ${score}</span>
                            <span class="category">${category}</span>
                            <div class="text">${text}</div>
                        `;
                        resultsDiv.appendChild(card);
                    });
                } else {
                    resultsDiv.innerHTML = '<p style="text-align: center; color: var(--text-muted)">No results found.</p>';
                }
            } catch (err) {
                resultsDiv.innerHTML = `<p style="color: red; text-align: center;">Error: ${err.message}</p>`;
            } finally {
                loadingDiv.style.display = 'none';
            }
        }
    </script>
</body>
</html>
